name: Render a CV
on:
  push:
    branches:
      - main
      - master
    paths:
      - "_data/cv.yml"
      - "assets/rendercv/design.yaml"
      - "assets/rendercv/locale.yaml"
      - "assets/rendercv/settings.yaml"
      - "requirements.txt"
      - ".github/workflows/render-cv.yml"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: |
          pip install -r requirements.txt
      - name: RenderCV
        run: |
          cv_file=$(find _data  -maxdepth 1 -type f \( -name "cv.yaml" -o -name "cv.yml" \))
          if [ -z "$cv_file" ]; then
            echo "No cv.yml file found!"
            exit 1
          fi
          rendercv_dir=$(find assets -maxdepth 1 -type d -name "rendercv")
          if [ -z "$rendercv_dir" ]; then
            echo "No RenderCV config directory found!"
            exit 1
          fi
          rendercv render "$cv_file" \
            --design "$rendercv_dir/design.yaml" \
            --locale-catalog "$rendercv_dir/locale.yaml" \
            --output-folder-name "rendercv_output" \
            --dont-generate-markdown \
            --dont-generate-html \
            --dont-generate-png
          mkdir -p assets/rendercv/rendercv_output
          rm -f assets/rendercv/rendercv_output/*.pdf
          mv rendercv_output/*.pdf assets/rendercv/rendercv_output/
          rm -rf rendercv_output
      - name: Upload rendercv_output as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: RenderCV Output
          path: assets/rendercv/rendercv_output
      - name: Push the changes
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add -A
          git commit -m "chore: render the latest CV"
          git push
